    <header>

                <div class="small-container">

                </div>

        </div>
            
        <hr class="line">
            <nav>
                <ul id="nav-list">
                    <li class="nav"><a href="home.html">Home</a></li>

            </nav>
        <hr>
    </header>

    <main>
        <div>
            <form action="">
                <label for="name">Name : 
                    <input name="name" type="text" required placeholder="Enter your name ">
                </label><br><br>

                <label for="email">Email : 
                    <input name="email" type="email" required placeholder="Enter your email">
                </label><br><br>

                <label for="courses">Courses : 
                    <select>
                        <option>Html</option>
                        <option>CSS</option>
                        <option>JavaScript</option>
                        <option>React</option>
                        <option> Node.js</option>
                    </select>
                </label><br><br>

                <strong>Rating : </strong><br><br>
                <label for="Rating" class="r-1">Excellent
                    <input type="radio" name="Rating">
                </label><br>

                <label for="Rating" class="r-1">Good
                    <input type="radio" name="Rating" class="r-1">
                </label><br>

                <label for="Rating" class="r-1">Average
                    <input type="radio" name="Rating" class="r-1">
                </label><br>

                <label for="Rating" class="r-1">Poor
                    <input type="radio" name="Rating" class="r-1">
                </label><br><br>

                <label for="Suggestions" class="r-1">Suggestions :
                    <textarea placeholder="Enter your Suggestions"></textarea>
                </label><br><br>

                <label for="condition" class="r-1">I agree with Terms
                    <input type="checkbox" name="condition" required>
                </label><br><br>

                <button type="submit">Submit</button><br><br>

            </form>
            <img src="https://thumbs.dreamstime.com/b/happy-young-asian-school-girl-looking-excitedly-her-mobile-phone-cartoon-vector-illustration-cute-little-elementary-uniform-446335510.jpg" alt="student portal image" id="portal-img">
        </div>
    </main>
