    <main>
        <form action="">
            <label for="name">Name : </label>
            <input name="name" type="text" required placeholder="Enter your name "><br><br>

            <label for="email">Email : </label>
            <input name="email" type="email" required placeholder="Enter your email"><br><br>

            <label for="courses">Courses : </label>
            <select>
                <option>Html</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>React</option>
                <option> Node.js</option>
            </select><br><br>

            <strong>Rating : </strong><br><br>
            <label for="Rating">Excellent</label>
            <input type="radio" name="Rating" id="1st"><br>

            <label for="Rating">Good</label>
            <input type="radio" name="Rating" id="2nd"><br>

            <label for="Rating">Average</label>
            <input type="radio" name="Rating" id="3rd"><br>

            <label for="Rating">Poor</label>
            <input type="radio" name="Rating" id="4th"><br><br>

            <label for="Suggestions">Suggestions</label>
            <textarea></textarea><br><br>

            <label for="condition">I agree with Terms</label>
            <input type="checkbox" name="condition" required><br><br>

            <button type="submit">Submit</button><br><br>

        </form>
